<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <style>
    .container {
      display: flex;
      gap: 10px;
    }
    /* 1. Hinh vuong */
    .hv {
      width: 100px;
      height: 100px;
      border: 4px solid red;
    }
    /* Hcn */
    .hcn {
      width: 200px;
      height: 100px;
      border: 4px solid blue;
    }

    .tgl {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 90px solid green;
    }

    .tgx {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-top: 90px solid orange;
    }

    .tgt {
      width: 0;
      height: 0;
      border-top: 50px solid transparent;
      border-bottom: 50px solid transparent;
      border-right: 100px solid violet;
    }

    .tgp {
      width: 0;
      height: 0;
      border-top: 50px solid transparent;
      border-bottom: 50px solid transparent;
      border-left: 100px solid brown;
    }

    .ht {
      width: 80px;
      height: 0;
      border-bottom: 80px solid green;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
    }

    .tgr {
      width: 0;
      height: 0;
      border-left: 70px solid transparent;
      border-right: 70px solid transparent;
      border-bottom: 50px solid gray;
    }
    .tgn {
      width: 0;
      height: 0;
      border-left: 25px solid transparent;
      border-right: 25px solid transparent;
      border-bottom: 100px solid red;
    }
    .tgc {
      width: 0;
      height: 0;
      border-left: 45px solid transparent;
      border-right: 45px solid transparent;
      border-bottom: 70px solid chocolate;
    }
    .mtp {
      width: 0;
      height: 0;
      border-top: 35px solid transparent;
      border-bottom: 35px solid transparent;
      border-left: 70px solid green;
    }

    .mtt {
      width: 0;
      height: 0;
      border-top: 35px solid transparent;
      border-bottom: 35px solid transparent;
      border-right: 70px solid violet;
    }

    .flag {
      width: 100px;
      height: 0;
      border-top: 40px solid brown;
      border-bottom: 40px solid brown;
      border-right: 40px solid transparent;
    }
  </style>
  <body>
    <div class="container">
      <!-- 1.Hinh vuong -->
      <div class="hv"></div>

      <!-- 2.Hinh chu nhat -->
      <div class="hcn"></div>

      <!-- 3.tam giac len -->
      <div class="tgl"></div>

      <!-- 4.Tam giac xuong -->
      <div class="tgx"></div>

      <!-- 5.Tam giac trai -->
      <div class="tgt"></div>

      <!-- 6.Tam giac phai -->
      <div class="tgp"></div>

      <!-- 7.Hinh thang -->
      <div class="ht"></div>

      <!-- 8.tam giac rong -->
      <div class="tgr"></div>
      <!-- 9.tam giac nhon -->
      <div class="tgn"></div>
      <!-- 10.tam giac can -->
      <div class="tgc"></div>
      <!-- 11.mui ten phai -->
      <div class="mtp"></div>
      <!-- 12.mui ten trai -->
      <div class="mtt"></div>
      <!-- 13. la co -->
      <div class="flag"></div>
      <!-- 14.F8 -->
      <div class="f8">
        <div class="f">
          <div class="f1"></div>
          <div class="f2"></div>
          <div class="f3"></div>
        </div>

        <div class="eight">
          <div class="top"></div>
          <div class="middle"></div>
          <div class="bottom"></div>
        </div>
      </div>
    </div>
  </body>
</html>
